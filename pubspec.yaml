name: mahendratalksin
description: "Mahendra Talks - Cinematic Portfolio App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0

  # 3D Model Viewer
  model_viewer_plus: ^1.7.2

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Navigation & Utils
  url_launcher: ^6.3.0
  provider: ^6.1.2
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/
    - assets/lottie/

  # Note: Google Fonts are loaded via the google_fonts package (no local font files needed)
